name: 'Build and Test'
description: 'Build and Test rippled or an alternate target'
inputs:
  name:
    description: 'Name of the running job'
    required: true
    default: 'base'
  CC:
    description: 'Compiler'
    required: true
  BUILD_TYPE:
    description: 'Build type: Debug or Release'
    required: true
    default: 'Debug'
  unity:
    description: 'Unity build flag: ON or OFF'
    required: true
    default: 'ON'
  CMAKE_ADD:
    description: 'Extra parameters to pass to CMake'
    required: false
    default: ''
  NUM_PROCESSORS:
    description: 'Number of simultaneous processes to use'
    required: false
  CACHE_DIR:
    description: 'Path to cache'
    required: true
  image:
    description: 'Name of docker image the job is running under'
    required: true
    default: ''
  cmakeconfig:
    description: 'Expects hash of all CMake config files'
    required: true
  headers:
    description: 'Expects hash of all header files'
    required: true
  source:
    description: 'Expects hash of all source files'
    required: true
  PARALLEL_TESTS:
    description: 'Boolean: Run tests in parallel'
    required: false
    default: true
  TARGET:
    description: 'CMake target to build and run'
    required: false
    default: 'rippled'
  SKIP_TESTS:
    description: 'Boolean: Skip tests after building'
    required: false
    default: false
  MANUAL_TESTS:
    description: 'Boolean: Run selected manual tests only'
    required: false
    default: false
  ASAN_OPTIONS:
    description: 'Options to use in asan builds'
    required: false
    default: ''
  UBSAN_OPTIONS:
    description: 'Options to use in ubsan builds'
    required: false
    default: ''
  TSAN_OPTIONS:
    description: 'Options to use in tsan builds'
    required: false
    default: ''
  NINJA_BUILD:
    description: 'Boolean: Build with Ninja'
    required: false
    default: true
  CMAKE_EXE:
    description: 'Use a specific instance of CMake'
    required: false
outputs:
  random-number:
    description: "Random number"
    value: ${{ steps.random-number-generator.outputs.random-id }}
runs:
  using: "composite"
  steps:
    - name: Dump-environment
      shell: bash
      run: |
        env
        set | grep =
    - name: Install ccache
      shell: bash
      run: |
        if ! type -a ccache
        then
          apt install ccache
        fi
    - name: Reset ccache stats
      shell: bash
      run: |
          ccache -s
          # Reset the stats so only this build counts
          ccache -z
    - name: Build and test
      shell: bash
      run: |
          export CXX=${CC/gcc/g++}
          export CXX=${CXX/clang/clang++}
          export NUM_PROCESSORS=${NUM_PROCESSORS:-$( nproc )}
          echo NUM_PROCESSORS is ${NUM_PROCESSORS}
          if [ "${{ inputs.image }}" == "rippled-ci-builder:2944b78d22db" ]
          then
              export CMAKE_EXTRA_ARGS+=" -DBoost_NO_BOOST_CMAKE=ON"
          fi
          if [ "${BUILD_TYPE}" == "Release" ]
          then
              export CMAKE_EXTRA_ARGS+=" -Dassert=ON"
          fi

          # Override environment variables that don't work smoothly
          # using env:
          if [[ "${{ inputs.PARALLEL_TESTS }}" != "" ]]; then export PARALLEL_TESTS="${{ inputs.PARALLEL_TESTS }}" ; fi
          if [[ "${{ inputs.TARGET }}" != "" ]]; then export TARGET="${{ inputs.TARGET }}" ; fi
          if [[ "${{ inputs.SKIP_TESTS }}" != "" ]]; then export SKIP_TESTS="${{ inputs.SKIP_TESTS }}" ; fi
          if [[ "${{ inputs.MANUAL_TESTS }}" != "" ]]; then export MANUAL_TESTS="${{ inputs.MANUAL_TESTS }}" ; fi
          if [[ "${{ inputs.ASAN_OPTIONS }}" != "" ]]; then export ASAN_OPTIONS="${{ inputs.ASAN_OPTIONS }}" ; fi
          if [[ "${{ inputs.UBSAN_OPTIONS }}" != "" ]]; then export UBSAN_OPTIONS="${{ inputs.UBSAN_OPTIONS }}" ; fi
          if [[ "${{ inputs.TSAN_OPTIONS }}" != "" ]]; then export TSAN_OPTIONS="${{ inputs.TSAN_OPTIONS }}" ; fi
          if [[ "${{ inputs.NINJA_BUILD }}" != "" ]]; then export NINJA_BUILD="${{ inputs.NINJA_BUILD }}" ; fi
          if [[ "${{ inputs.CMAKE_EXE }}" != "" ]]; then export CMAKE_EXE="${{ inputs.CMAKE_EXE }}" ; fi
          if [ "${CMAKE_ADD}" != "" ] ; then export CMAKE_EXTRA_ARGS+=" ${CMAKE_ADD}"; fi
          # Do the build
          bin/ci/ubuntu/build-and-test.sh
    - name: Post-run ccache stats
      shell: bash
      run: ccache -s
    - name: Debug output
      shell: bash
      run: |
        time df -h
        du -s ${NIH_CACHE_ROOT}/*
        if [ -e build ] ; then find build \( -name CMakeOutput.log -o -name CMakeError.log \) -ls -exec cat {} \; ; fi
