name: "MacOS build, general"
on: [push, pull_request]

# The files starting with "build-" are all interdependent.
# If any significant changes are made, be sure to update them
# to keep them in sync.

env:
  CMAKE_EXTRA_ARGS: |
    -Dwerr=ON -Dwextra=ON
    -DBOOST_ROOT=${BOOST_ROOT}/_INSTALLED_
    -DBoost_ARCHITECTURE=-x64
    -DBoost_NO_SYSTEM_PATHS=ON
    -DCMAKE_VERBOSE_MAKEFILE=ON
  NINJA_BUILD: true
  CACHE_DIR: ${{ github.workspace }}/_cache
  #NIH_CACHE_ROOT: ${{ github.workspace }}/_cache/nih_c
  # put NIH in non-cache location since it seems to
  # cause failures when homebrew updates
  NIH_CACHE_ROOT: ${{ github.workspace }}/nih_c
  PARALLEL_TESTS: true
  USE_CCACHE: true
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_NOHASHDIR: true
  CCACHE_DIR: ${{ github.workspace }}/_cache/ccache
  # TEST_EXTRA_ARGS: ""
  BOOST_ROOT: ${{ github.workspace }}/_cache/boost_1_70_0

jobs:
  macos_everything_else:
    name: MacOS
    runs-on: "macos-latest"
    timeout-minutes: 720
    outputs:
      cmakeconfig: ${{ steps.cachekeys.outputs.cmakeconfig }}
      headers: ${{ steps.cachekeys.outputs.headers }}
      source: ${{ steps.cachekeys.outputs.source }}
    strategy:
      fail-fast: false
      matrix:
        BLD_CONFIG: [ "Debug", "Release" ]
        TEST_EXTRA_ARGS: [ "" ]
        include:
            # Special cases which add to or override the cases in the
            # matrix.
            #
            - BLD_CONFIG: "Release"
              CMAKE_ADD: "-Dassert=ON"
            - BLD_CONFIG: "Debug"
              TEST_EXTRA_ARGS: "--unittest-ipv6"
    env:
      BLD_CONFIG: ${{ matrix.BLD_CONFIG }}
      TEST_EXTRA_ARGS: ${{ matrix.TEST_EXTRA_ARGS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build cache keys
        id: cachekeys
        shell: bash
        run: |
          echo "::set-output name=cmakeconfig::${{ hashfiles('CMakeFiles.txt', 'Builds/CMake/**') }}"
          echo "::set-output name=headers::${{ hashfiles('src/**/*.h', 'src/**/*.hpp', 'src/**/*.ipp') }}"
          echo "::set-output name=source::${{ hashfiles('src/**', '!src/**/*.md', '!src/**/*.uml', '!src/**/*.png', '!src/**/*.php') }}"
          type -a brew
      - name: Cache
        continue-on-error: true
        uses: actions/cache@v2
        # The cache key is built on the following in order
        # 1) OS.
        # 2) The hash of all the CMake config files.
        # 3) The build compiler
        # 4) The build type
        # 5) The build unity setting
        # 6) The build custom name.
        # 7) The hash of all the header files under the source dir.
        # 8) The hash of all the code files under the source dir.
        # When restoring, if the matching cache is not found, search for a usable
        # cache by chopping pieces off the end of the cache key until a match is
        # found, with a special case for the NIH built in the previous job
        with:
          path: ${{ env.CACHE_DIR }}
          key: ${{ runner.os }}-${{ steps.cachekeys.outputs.cmakeconfig }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.UNITY }}-${{ matrix.name }}-${{ steps.cachekeys.outputs.headers }}-${{ steps.cachekeys.outputs.source }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.cachekeys.outputs.cmakeconfig }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.UNITY }}-${{ matrix.name }}-${{ steps.cachekeys.outputs.headers }}
            ${{ runner.os }}-${{ steps.cachekeys.outputs.cmakeconfig }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.UNITY }}-${{ matrix.name }}
            ${{ runner.os }}-${{ steps.cachekeys.outputs.cmakeconfig }}-${{ matrix.image }}-nih
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master
      - name: Cache Homebrew Bundler RubyGems
        id: cacherubygems
        uses: actions/cache@v2
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-
      - name: status
        run: |
          df -h .
          du -hs ${{ steps.set-up-homebrew.outputs.gems-path }}
      - name: Install Homebrew Bundler RubyGems
        if: steps.cacherubygems.outputs.cache-hit != 'true'
        run: brew install-bundler-gems
      - name: status
        run: |
          df -h .
          du -hs ${{ steps.set-up-homebrew.outputs.gems-path }}
      - name: Install Homebrew packages
        if: steps.cacherubygems.outputs.cache-hit != 'true'
        run: |
          for pkg in protobuf grpc pkg-config bash ninja cmake wget zstd libarchive openssl@1.1
          do
            brew install ${pkg} || brew update ${pkg}
          done
      - name: status
        run: |
          df -h .
          du -hs ${{ steps.set-up-homebrew.outputs.gems-path }}
      - name: Dump environment
        run: |
          env
          set | grep =
      - name: Disk space before
        shell: bash
        run: |
          df -h
          du -sh ${CACHE_DIR}
          du -sh ${CCACHE_DIR} || true
          find ${NIH_CACHE_ROOT} -maxdepth 2 \( -iname src -prune -o \
            -type d -exec du -sh {} \; \) || true
      - name: Pre-install
        shell: bash
        run: |
          export NUM_PROCESSORS=${NUM_PROCESSORS:-$(nproc)}
          echo "NUM PROC is ${NUM_PROCESSORS}"
          if [ "${CMAKE_ADD}" != "" ] ; then export CMAKE_EXTRA_ARGS+=" ${CMAKE_ADD}"; fi
      - name: Install boost
        shell: bash
        run: |
          export OPENSSL_ROOT=$(brew --prefix openssl@1.1)
          ./Builds/containers/shared/install_boost.sh
          brew uninstall --ignore-dependencies boost
      - name: Build and test
        shell: bash
        run: |
          mkdir -p build.macos && cd build.macos
          cmake -G Ninja ${CMAKE_EXTRA_ARGS} -DCMAKE_BUILD_TYPE=${BLD_CONFIG} ..
          cmake --build . --parallel --verbose
          ./rippled --unittest --quiet --unittest-log --unittest-jobs ${NUM_PROCESSORS} ${TEST_EXTRA_ARGS}
      - name: Disk space after
        shell: bash
        if: always()
        run: |
          df -h
          du -sh ${CACHE_DIR}
          du -sh ${CCACHE_DIR} || true
          find ${NIH_CACHE_ROOT} -maxdepth 2 \( -iname src -prune -o \
            -type d -exec du -sh {} \; \) || true
      - name: Debug output artifacts
        if: always()
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: debug-output ${{ matrix.name }} ${{ matrix.CC }} ${{ matrix.BUILD_TYPE }} unity=${{ matrix.UNITY }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            build/**/CMakeOutput.log
            build/**/CMakeError.log
      - name: rippled executable artifact
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: rippled ${{ matrix.name }} ${{ matrix.CC }} ${{ matrix.BUILD_TYPE }} unity=${{ matrix.UNITY }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            build/**/rippled
            !build/**/_INSTALLED_/**