name: Build and test rippled
on: [push, pull_request]

env:
  CMAKE_EXTRA_ARGS: "-Dwerr=ON -Dwextra=ON"
  NINJA_BUILD: true
  CACHE_DIR: ${{ github.workspace }}/_cache
  NIH_CACHE_ROOT: ${{ github.workspace }}/_cache/nih_c
  PARALLEL_TESTS: true
  USE_CCACHE: true
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_NOHASHDIR: true
  CCACHE_DIR: ${{ github.workspace }}/_cache/ccache

jobs:
  linux-cache:
    name: Initialize linux cache
    runs-on: ubuntu-18.04
    timeout-minutes: 720
    container:
      image: "rippleci/rippled-ci-builder:2020-01-08"
    env:
      # These options are chosen arbitrarily
      CC: "clang-8"
      BUILD_TYPE: "Debug"
      CMAKE_EXTRA_ARGS: "-Dwerr=ON -Dwextra=ON -Dunity=ON"
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: cache
        continue-on-error: true
        uses: actions/cache@v2
        with:
          path: ${{ env.CACHE_DIR }}
          key:  ${{ runner.os }}-build-${{ hashfiles('**/CMakeFiles.txt', '**/Builds/CMake/*', '**/Builds/CMake/deps/*') }}
      - name: CMake
        shell: bash
        run: |
          export CXX=${CC/gcc/g++}
          export CXX=${CXX/clang/clang++}
          cmake --version
          ${CC} --version
          ${CXX} --version
          dir="build/$( basename ${CXX} ).${BUILD_TYPE}"
          mkdir "${dir}"
          cd "${dir}"
          cmake -DCMAKE_BUILD_TYPE=${BUILD_TYPE} ${CMAKE_EXTRA_ARGS} ../..
      - name: Debug output
        if: always()
        shell: bash
        continue-on-error: true
        run: |
          time df -h
          for dir in ${{ env.CACHE_DIR }} ${{ env.NIH_CACHE_ROOT }} ${{ env.CCACHE_DIR }} build
          do
            if [[ -e "${dir}" ]]
            then
                time du -sh "${dir}"
            else
                find -name $( basename "${dir}" ) -type d -print -exec du -sh {} \; || \
                echo "Not found: ${dir}"
            fi
          done
          if [ -e build ] ; then find build \( -name CMakeOutput.log -o -name CMakeError.log \) -ls -exec cat {} \; ; fi
      - name: Debug output artifacts
        if: always()
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: debug-output
          retention-days: 7
          path: |
            build/**/CMakeOutput.log
            build/**/CMakeError.log
  linux1:
    name: Linux 1
    runs-on: ubuntu-18.04
    timeout-minutes: 720
    # if: commit_message !~ /travis_run_/ OR commit_message =~ /travis_run_linux/
    strategy:
      fail-fast: false
      matrix:
        # Current travis: gcc-8 clang-8 gcc-9 clang-9
        # docker image has clang 7,8,9 & gcc 6,7,8,9
        CC: [ "gcc-9", "clang-8" , "clang-9" , "gcc-8" ]
        BUILD_TYPE: [ Debug, Release ]
        unity: [ "unity=OFF", "unity=ON" ]
        canfail: [ false ]
        image: [ "rippleci/rippled-ci-builder:2020-01-08" ]
        name: [ "" ]
        #exclude:
        #    - CC: "clang-8"
        #    - CC: "clang-9"
        #    - CC: "gcc-8"
        #    - BUILD_TYPE: "Debug"
        #    - name: ""
        include:
            # Special cases which add to or override the cases in the
            # matrix.
            #
            # Note that "name" is used in the cache key, which cannot
            # contain commas (',').
            #
            # gcc-9 Release unity runs out of memory, so build smaller
            # unity files.
            - CC: "gcc-9"
              BUILD_TYPE: "Release"
              CMAKE_ADD: "-DCMAKE_UNITY_BUILD_BATCH_SIZE=7"
              unity: "unity=ON"
              canfail: false
              image: "rippleci/rippled-ci-builder:2020-01-08"
              name: ""
            # Reporting mode
            - name: "Reporting clang-8 debug"
              CMAKE_ADD: "-Dreporting=ON"
              CC: "clang-8"
              BUILD_TYPE: "Debug"
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: false
            # Coverage builds
            - name: "Coverage gcc-8"
              CMAKE_ADD: "-Dcoverage=ON"
              CC: "gcc-8"
              BUILD_TYPE: "Debug"
              TARGET: coverage_report
              SKIP_TESTS: true
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: false
            - name: "Coverage clang-8"
              CMAKE_ADD: "-Dcoverage=ON"
              CC: "clang-8"
              BUILD_TYPE: "Debug"
              TARGET: coverage_report
              SKIP_TESTS: true
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: false
            # Manual tests
            - name: "Manual tests gcc-8 debug"
              MANUAL_TESTS: true
              CC: "gcc-8"
              BUILD_TYPE: Debug
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: false
            - name: "Manual tests gcc-8 release"
              MANUAL_TESTS: true
              CC: "gcc-8"
              BUILD_TEST: "Release"
              CMAKE_ADD: "-Dassert=ON -Dunity=OFF"
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: false
            # asan
            - name: "asan clang-8"
              ASAN_OPTIONS: "print_stats=true:atexit=true"
              CMAKE_ADD: "-Dsan=address"
              CC: "clang-8"
              BUILD_TYPE: Release
              PARALLEL_TESTS: false
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: false
            # ubsan
            - name: "ubsan clang-8"
              UBSAN_OPTIONS: "print_stacktrace=1:report_error_type=1"
              CMAKE_ADD: "-Dsan=undefined"
              CC: "clang-8"
              BUILD_TYPE: Release
              PARALLEL_TESTS: false
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: false
            # tsan
            # current tsan failure *might* be related to:
            # https://github.com/google/sanitizers/issues/1104
            #  but we can't get it to run, so leave it disabled for now
            - name: "tsan clang-8"
              TSAN_OPTIONS: "history_size=3 external_symbolizer_path=/usr/bin/llvm-symbolizer verbosity=1"
              CMAKE_ADD: "-Dsan=thread"
              CC: "clang-8"
              BUILD_TYPE: "Release"
              PARALLEL_TESTS: false
              unity: "unity=ON"
              canfail: true
              image: "rippleci/rippled-ci-builder:2020-01-08"
            # dynamic lib builds
            - name: "non-static gcc-8"
              CMAKE_ADD: "-Dstatic=OFF"
              CC: "gcc-8"
              BUILD_TYPE: Debug
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: true
            - name: "non-static BUILD_SHARED_LIBS gcc-8"
              CMAKE_ADD: "-Dstatic=OFF -DBUILD_SHARED_LIBS=ON"
              CC: "gcc-8"
              BUILD_TYPE: Debug
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: true
            # makefile
            - name: "makefile generator gcc-8"
              NINJA_BUILD: false
              CC: "gcc-8"
              BUILD_TYPE: Debug
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: true
            # verify build with min version of cmake
            - name: "min cmake version"
              CMAKE_EXE: /opt/local/cmake-3.9/bin/cmake
              CC: "gcc-8"
              BUILD_TYPE: Debug
              SKIP_TESTS: true
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: true
            # validator keys project as subproj of rippled
            - name: "validator-keys"
              TARGET: validator-keys
              CC: "gcc-8"
              BUILD_TYPE: Debug
              CMAKE_ADD: "-Dvalidator_keys=ON"
              unity: "unity=ON"
              image: "rippleci/rippled-ci-builder:2020-01-08"
              canfail: true
    # https://docs.github.com/en/free-pro-team@latest/actions/reference/workflow-syntax-for-github-actions#jobsjob_idcontinue-on-error
    continue-on-error: ${{ matrix.canfail }}
    container:
      image: ${{ matrix.image }}
    env:
      CC: ${{ matrix.CC }}
      BUILD_TYPE: ${{ matrix.BUILD_TYPE }}
      CMAKE_ADD: "-D${{ matrix.unity }} ${{ matrix.CMAKE_ADD }}"
      NUM_PROCESSORS: ${{ matrix.NUM_PROCESSORS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: cache
        continue-on-error: true
        uses: actions/cache@v2
        with:
          path: ${{ env.CACHE_DIR }}
          key:  ${{ runner.os }}-build-${{ hashfiles('**/CMakeFiles.txt', '**/Builds/CMake/*', '**/Builds/CMake/deps/*') }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.UNITY }}-${{ matrix.name }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashfiles('**/CMakeFiles.txt', '**/Builds/CMake/*', '**/Builds/CMake/deps/*') }}
      - name: Dump-environment
        run: |
          env
          set | grep =
      - name: Clean up space
        shell: bash
        run: |
          time df -h
          for dir in ${{ env.CACHE_DIR }} build
          do
            if [[ -e "${dir}" ]]
            then
                time du -sh "${dir}"
            else
                find -name $( basename "${dir}" ) -type d -print -exec du -sh {} \; || \
                echo "Not found: ${dir}"
            fi
          done
          # swapoff -a
          # rm -f /swapfile
          if type -a apt
          then
            apt clean
          fi
          if type -a docker
          then
            docker rm $(docker ps -q -f 'status=exited')
            docker rmi $(docker images -q -f "dangling=true")
          fi
          time df -h
          for dir in ${{ env.CACHE_DIR }} build
          do
            if [[ -e "${dir}" ]]
            then
                time du -sh "${dir}"
            else
                find -name $( basename "${dir}" ) -type d -print -exec du -sh {} \; || \
                echo "Not found: ${dir}"
            fi
          done
      - name: ccache stats before
        run: ccache -s
      - name: Build and test
        shell: bash
        run: |
          export CXX=${CC/gcc/g++}
          export CXX=${CXX/clang/clang++}
          export NUM_PROCESSORS=${NUM_PROCESSORS:-$( nproc )}
          echo NUM_PROCESSORS is ${NUM_PROCESSORS}
          # Override environment variables that don't work smoothly
          # using env:
          if [[ "${{ matrix.PARALLEL_TESTS }}" != "" ]]; then export PARALLEL_TESTS="${{ matrix.PARALLEL_TESTS }}" ; fi
          if [[ "${{ matrix.TARGET }}" != "" ]]; then export TARGET="${{ matrix.TARGET }}" ; fi
          if [[ "${{ matrix.SKIP_TESTS }}" != "" ]]; then export SKIP_TESTS="${{ matrix.SKIP_TESTS }}" ; fi
          if [[ "${{ matrix.MANUAL_TESTS }}" != "" ]]; then export MANUAL_TESTS="${{ matrix.MANUAL_TESTS }}" ; fi
          if [[ "${{ matrix.ASAN_OPTIONS }}" != "" ]]; then export ASAN_OPTIONS="${{ matrix.ASAN_OPTIONS }}" ; fi
          if [[ "${{ matrix.UBSAN_OPTIONS }}" != "" ]]; then export UBSAN_OPTIONS="${{ matrix.UBSAN_OPTIONS }}" ; fi
          if [[ "${{ matrix.TSAN_OPTIONS }}" != "" ]]; then export TSAN_OPTIONS="${{ matrix.TSAN_OPTIONS }}" ; fi
          if [[ "${{ matrix.NINJA_BUILD }}" != "" ]]; then export NINJA_BUILD="${{ matrix.NINJA_BUILD }}" ; fi
          if [[ "${{ matrix.CMAKE_EXE }}" != "" ]]; then export CMAKE_EXE="${{ matrix.CMAKE_EXE }}" ; fi
          if [ "${CMAKE_ADD}" != "" ] ; then export CMAKE_EXTRA_ARGS="${CMAKE_EXTRA_ARGS} ${CMAKE_ADD}"; fi
          # Do the build
          bin/ci/ubuntu/build-and-test.sh
      - name: ccache stats after
        run: ccache -s
      - name: Debug output
        if: always()
        shell: bash
        continue-on-error: true
        run: |
          time df -h
          for dir in ${{ env.CACHE_DIR }} ${{ env.NIH_CACHE_ROOT }} ${{ env.CCACHE_DIR }} build
          do
            if [[ -e "${dir}" ]]
            then
                time du -sh "${dir}"
            else
                find -name $( basename "${dir}" ) -type d -print -exec du -sh {} \; || \
                echo "Not found: ${dir}"
            fi
          done
          if [ -e build ] ; then find build \( -name CMakeOutput.log -o -name CMakeError.log \) -ls -exec cat {} \; ; fi
      - name: Debug output artifacts
        if: always()
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: debug-output
          retention-days: 7
          path: |
            build/**/CMakeOutput.log
            build/**/CMakeError.log
      - name: rippled executable artifact
        if: always()
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: rippled
          retention-days: 7
          path: |
            build/**/rippled
