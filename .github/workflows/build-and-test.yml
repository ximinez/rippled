name: Build and test rippled
on: [push, pull_request]

env:
  CMAKE_EXTRA_ARGS: "-Dwerr=ON -Dwextra=ON"
  NINJA_BUILD: true
  CACHE_DIR: ${{ github.workspace }}/_cache
  NIH_CACHE_ROOT: ${{ github.workspace }}/_cache/nih_c
  PARALLEL_TESTS: true
  USE_CCACHE: true
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_NOHASHDIR: true
  CCACHE_DIR: ${{ github.workspace }}/_cache/ccache

jobs:
  linux-cache:
    name: Initialize linux cache
    # The NIH setup puts all the dependency source code in a single,
    # shared directory. Run cmake across all of the compiler combos,
    # then put all the NIH code in the cache. This accomplishes:
    # 1) This cache will be as small as possible, since the source is
    #    not duplicated.
    # 2) This cache will be available to all builds, so they don't all
    #    have to separately download, for example, NuDB.
    # 3) Unity does not affect the NIH cache, so those two builds can
    #    share this cache.
    # 4) The time to download is not wasted if a build fails, even
    #    though a failed build will not push a cache.
    # The one downside is that not all compilers are available on all
    # docker images, so there will be one cache per image.
    runs-on: ubuntu-18.04
    timeout-minutes: 720
    strategy:
      matrix:
        # All of these matrix arrays have one string item, but this is an easy way
        # to add another build for the other image
        ninja_ccs: [ "gcc-8 gcc-9 clang-8 clang-9" ]
        ninja_types: [ "Debug Release" ]
        image: [ "rippled-ci-builder:2020-01-08" ]
        make_ccs: [ "" ]
        make_types: [ "" ]
        include:
          - ninja_ccs: "gcc-8 clang-10"
            ninja_types: "Debug Release"
            image: "rippled-ci-builder:2944b78d22db"
            make_ccs: "gcc-8"
            make_types: "Debug"
    container:
      image: rippleci/${{ matrix.image }}
    outputs:
      cmakeconfig: ${{ steps.cachekeys.outputs.cmakeconfig }}
      headers: ${{ steps.cachekeys.outputs.headers }}
      source: ${{ steps.cachekeys.outputs.source }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build cache keys
        id: cachekeys
        shell: bash
        run: |
          echo "::set-output name=cmakeconfig::${{ hashfiles('CMakeFiles.txt', 'Builds/CMake/**') }}"
          echo "::set-output name=headers::${{ hashfiles('src/**/*.h', 'src/**/*.hpp', 'src/**/*.ipp') }}"
          echo "::set-output name=source::${{ hashfiles('src/**', '!src/**/*.md', '!src/**/*.uml', '!src/**/*.png', '!src/**/*.php') }}"
      - name: Cache
        id: cache
        continue-on-error: true
        uses: actions/cache@v2
        with:
          path: ${{ env.CACHE_DIR }}
          key: ${{ runner.os }}-${{ steps.cachekeys.outputs.cmakeconfig }}-${{ matrix.image }}-nih-${{ matrix.ninja_ccs }}-${{ matrix.make_ccs }}
      - name: Initialize CMake cache
        if: ${{ ! steps.cache.outputs.cache-hit }}
        shell: bash
        run: |
            if [[ -e "${NIH_CACHE_ROOT}" ]]
            then
                echo Cache is already set up.
                exit
            fi

            cmake --version

            if [ "${{ matrix.image }}" == "rippled-ci-builder:2944b78d22db" ]
            then
                export CMAKE_EXTRA_ARGS+=" -DBoost_NO_BOOST_CMAKE=ON"
            fi

            # Builds that use unix-makefiles
            for CC in ${{ matrix.make_ccs }}
            do
                for BUILD_TYPE in ${{ matrix.make_types }}
                do
                    export CC BUILD_TYPE
                    export CXX=${CC/gcc/g++}
                    export CXX=${CXX/clang/clang++}
                    ${CC} --version
                    ${CXX} --version
                    dir="build/$( basename ${CXX} ).${BUILD_TYPE}.makefile"
                    mkdir -pv "${dir}"
                    pushd "${dir}"
                    set -x
                    cmake -DCMAKE_BUILD_TYPE=${BUILD_TYPE} ${CMAKE_EXTRA_ARGS} ../..
                    set +x
                    popd
                done
            done

            # Builds that use Ninja
            export CMAKE_EXTRA_ARGS+=" -G Ninja"
            for CC in ${{ matrix.ninja_ccs }}
            do
                for BUILD_TYPE in ${{ matrix.ninja_types }}
                do
                    export CC BUILD_TYPE
                    export CXX=${CC/gcc/g++}
                    export CXX=${CXX/clang/clang++}
                    ${CC} --version
                    ${CXX} --version
                    dir="build/$( basename ${CXX} ).${BUILD_TYPE}"
                    mkdir -pv "${dir}"
                    pushd "${dir}"
                    set -x
                    cmake -DCMAKE_BUILD_TYPE=${BUILD_TYPE} ${CMAKE_EXTRA_ARGS} ../..
                    set +x
                    popd
                done
            done

            find ${NIH_CACHE_ROOT} -type d -maxdepth 4
            du -cs ${NIH_CACHE_ROOT}
            du -cs ${NIH_CACHE_ROOT}/* || true
            du -cs ${NIH_CACHE_ROOT}/{unix_makefiles,ninja}/*/* || true
      - name: Debug output
        if: ${{ ! steps.cache.outputs.cache-hit || failure() }}
        shell: bash
        continue-on-error: true
        run: |
          time df -h
          if [ -e build ] ; then find build \( -name CMakeOutput.log -o -name CMakeError.log \) -ls -exec cat {} \; ; fi
      - name: Debug output artifacts
        if: ${{ ! steps.cache.outputs.cache-hit || failure() }}
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: debug-output NIH ${{ matrix.ninja_ccs }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            build/**/CMakeOutput.log
            build/**/CMakeError.log
  linux-base:
    name: Linux base builds
    needs: linux-cache
    runs-on: ubuntu-18.04
    timeout-minutes: 720
    # if: commit_message !~ /travis_run_/ OR commit_message =~ /travis_run_linux/
    strategy:
      fail-fast: false
      matrix:
        # Current travis: gcc-8 clang-8 gcc-9 clang-9
        # docker image has clang 7,8,9 & gcc 6,7,8,9
        CC: [ "gcc-8", "gcc-9", "clang-8", "clang-9", "clang-10" ]
        BUILD_TYPE: [ Debug, Release ]
        unity: [ "OFF", "ON" ]
        image: [ "rippled-ci-builder:2020-01-08", "rippled-ci-builder:2944b78d22db" ]
        name: [ "base" ]
        exclude:
            # The 2020-01-08 image doesn't have clang-10
            - image: "rippled-ci-builder:2020-01-08"
              CC: "clang-10"
            # The 2020-01-08 image does have gcc-8, but it's
            # having problems, so see if it builds any better
            # with the other one
            - image: "rippled-ci-builder:2020-01-08"
              CC: "clang-10"
            - image: "rippled-ci-builder:2020-01-08"
              CC: "gcc-8"
            # The 2020-01-08 image has the other compilers, so
            # don't build on the other one
            - image: "rippled-ci-builder:2944b78d22db"
              CC: "gcc-9"
            - image: "rippled-ci-builder:2944b78d22db"
              CC: "clang-8"
            - image: "rippled-ci-builder:2944b78d22db"
              CC: "clang-9"
        #include:
            # Special cases which add to or override the cases in the
            # matrix.
            #
            # Note that "name" is used in the cache key, which cannot
            # contain commas (',').
            #
            # gcc-9 Release unity runs out of memory, so build smaller
            # unity files.
            # - CC: "gcc-9"
            #  BUILD_TYPE: "Release"
            #  CMAKE_ADD: "-DCMAKE_UNITY_BUILD_BATCH_SIZE=7"
            #  unity: "ON"
            #  canfail: false
            #  image: "rippled-ci-builder:2020-01-08"
    container:
      image: rippleci/${{ matrix.image }}
    env:
      CC: ${{ matrix.CC }}
      BUILD_TYPE: ${{ matrix.BUILD_TYPE }}
      CMAKE_ADD: "-Dunity=${{ matrix.unity }} ${{ matrix.CMAKE_ADD }}"
      NUM_PROCESSORS: ${{ matrix.NUM_PROCESSORS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Cache
        continue-on-error: true
        uses: actions/cache@v2
        # The cache key is built on the following in order
        # 1) OS.
        # 2) The hash of all the CMake config files.
        # 3) Docker image
        # 4) The build compiler
        # 5) The build type
        # 6) The build unity setting
        # 7) The build custom name.
        # 8) The hash of all the header files under the source dir.
        # 9) The hash of all the code files under the source dir.
        # When restoring, if the matching cache is not found, search for a usable
        # cache by chopping pieces off the end of the cache key until a match is
        # found, with special cases for a "base" build, and the NIH built in the
        # previous job
        with:
          path: ${{ env.CACHE_DIR }}
          key: ${{ runner.os }}-${{ needs.linux-cache.outputs.cmakeconfig }}-${{ matrix.image }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.UNITY }}-${{ matrix.name }}-${{ needs.linux-cache.outputs.headers }}-${{ needs.linux-cache.outputs.source }}
          restore-keys: |
            ${{ runner.os }}-${{ needs.linux-cache.outputs.cmakeconfig }}-${{ matrix.image }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.UNITY }}-${{ matrix.name }}-${{ needs.linux-cache.outputs.headers }}
            ${{ runner.os }}-${{ needs.linux-cache.outputs.cmakeconfig }}-${{ matrix.image }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.UNITY }}-${{ matrix.name }}
            ${{ runner.os }}-${{ needs.linux-cache.outputs.cmakeconfig }}-${{ matrix.image }}-nih
      - name: Dump-environment
        run: |
          env
          set | grep =
      - name: Install ccache
        if: matrix.image == 'rippled-ci-builder:2944b78d22db'
        shell: bash
        run: |
          if ! type -a ccache
          then
            apt install ccache
          fi
      - name: Reset ccache stats
        run: |
            ccache -s
            # Reset the stats so only this build counts
            ccache -z
      - name: Build and test
        uses: ./.github/actions/build-action
        with:
          image: ${{ matrix.image }}
      - name: Debug output artifacts
        if: always()
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: debug-output ${{ matrix.name }} ${{ matrix.CC }} ${{ matrix.BUILD_TYPE }} ${{ matrix.UNITY }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            build/**/CMakeOutput.log
            build/**/CMakeError.log
      - name: rippled executable artifact
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: rippled ${{ matrix.name }} ${{ matrix.CC }} ${{ matrix.BUILD_TYPE }} ${{ matrix.UNITY }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            build/**/rippled
            !build/**/_INSTALLED_/**
  linux-special:
    name: Linux special case builds
    needs: linux-base
    runs-on: ubuntu-18.04
    timeout-minutes: 720
    # if: commit_message !~ /travis_run_/ OR commit_message =~ /travis_run_linux/
    strategy:
      fail-fast: false
      matrix:
        # Current travis: gcc-8 clang-8 gcc-9 clang-9
        # docker image has clang 7,8,9 & gcc 6,7,8,9
        #CC: [ "gcc-8", "gcc-9", "clang-8", "clang-9", "clang-10" ]
        #BUILD_TYPE: [ Debug, Release ]
        #unity: [ "unity=OFF", "unity=ON" ]
        #canfail: [ false ]
        #image: [ "rippled-ci-builder:2020-01-08", "rippled-ci-builder:2944b78d22db" ]
        #name: [ "base" ]
        include:
            # Special cases which add to or override the cases in the
            # matrix.
            #
            # Note that "name" is used in the cache key, which cannot
            # contain commas (',').
            #
            # Reporting mode
            - name: "Reporting clang-8 debug"
              CMAKE_ADD: "-Dreporting=ON"
              CC: "clang-8"
              BUILD_TYPE: "Debug"
              unity: "ON"
              image: "rippled-ci-builder:2020-01-08"
              canfail: false
            # Coverage builds
            - name: "Coverage gcc-8"
              CMAKE_ADD: "-Dcoverage=ON"
              CC: "gcc-8"
              BUILD_TYPE: "Debug"
              TARGET: coverage_report
              SKIP_TESTS: true
              unity: "ON"
              # Need this image because it has the coverage tools
              image: "rippled-ci-builder:2020-01-08"
              canfail: false
            - name: "Coverage clang-8"
              CMAKE_ADD: "-Dcoverage=ON"
              CC: "clang-8"
              BUILD_TYPE: "Debug"
              TARGET: coverage_report
              SKIP_TESTS: true
              unity: "ON"
              # Need this image because it has the coverage tools
              image: "rippled-ci-builder:2020-01-08"
              canfail: false
            # asan
            - name: "asan clang-8"
              ASAN_OPTIONS: "print_stats=true:atexit=true"
              CMAKE_ADD: "-Dsan=address"
              CC: "clang-8"
              BUILD_TYPE: Release
              PARALLEL_TESTS: false
              unity: "ON"
              image: "rippled-ci-builder:2020-01-08"
              canfail: false
            # ubsan
            - name: "ubsan clang-8"
              UBSAN_OPTIONS: "print_stacktrace=1:report_error_type=1"
              CMAKE_ADD: "-Dsan=undefined"
              CC: "clang-8"
              BUILD_TYPE: Release
              PARALLEL_TESTS: false
              unity: "ON"
              image: "rippled-ci-builder:2020-01-08"
              canfail: false
            # tsan
            # current tsan failure *might* be related to:
            # https://github.com/google/sanitizers/issues/1104
            #  but we can't get it to run, so leave it disabled for now
            - name: "tsan clang-8"
              TSAN_OPTIONS: "history_size=3 external_symbolizer_path=/usr/bin/llvm-symbolizer verbosity=1"
              CMAKE_ADD: "-Dsan=thread"
              CC: "clang-8"
              BUILD_TYPE: "Release"
              PARALLEL_TESTS: false
              unity: "ON"
              canfail: true
              image: "rippled-ci-builder:2020-01-08"
            # dynamic lib builds
            - name: "non-static gcc-8"
              CMAKE_ADD: "-Dstatic=OFF"
              CC: "gcc-8"
              BUILD_TYPE: Debug
              unity: "ON"
              image: "rippled-ci-builder:2944b78d22db"
              canfail: true
            - name: "non-static BUILD_SHARED_LIBS gcc-8"
              CMAKE_ADD: "-Dstatic=OFF -DBUILD_SHARED_LIBS=ON"
              CC: "gcc-8"
              BUILD_TYPE: Debug
              unity: "ON"
              image: "rippled-ci-builder:2944b78d22db"
              canfail: true
            # makefile
            - name: "makefile generator gcc-8"
              NINJA_BUILD: false
              CC: "gcc-8"
              BUILD_TYPE: Debug
              unity: "ON"
              image: "rippled-ci-builder:2944b78d22db"
              canfail: true
            # verify build with min version of cmake
            - name: "min cmake version"
              CMAKE_EXE: /opt/local/cmake-3.9/bin/cmake
              CC: "gcc-8"
              BUILD_TYPE: Debug
              SKIP_TESTS: true
              unity: "ON"
              image: "rippled-ci-builder:2944b78d22db"
              canfail: true
            # validator keys project as subproj of rippled
            - name: "validator-keys"
              TARGET: validator-keys
              CC: "gcc-8"
              BUILD_TYPE: Debug
              CMAKE_ADD: "-Dvalidator_keys=ON"
              unity: "ON"
              image: "rippled-ci-builder:2944b78d22db"
              canfail: true
    # https://docs.github.com/en/free-pro-team@latest/actions/reference/workflow-syntax-for-github-actions#jobsjob_idcontinue-on-error
    continue-on-error: ${{ matrix.canfail }}
    container:
      image: rippleci/${{ matrix.image }}
    env:
      CC: ${{ matrix.CC }}
      BUILD_TYPE: ${{ matrix.BUILD_TYPE }}
      CMAKE_ADD: "-Dunity=${{ matrix.unity }} ${{ matrix.CMAKE_ADD }}"
      NUM_PROCESSORS: ${{ matrix.NUM_PROCESSORS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Cache
        continue-on-error: true
        uses: actions/cache@v2
        # The cache key is built on the following in order
        # 1) OS.
        # 2) The hash of all the CMake config files.
        # 3) Docker image
        # 4) The build compiler
        # 5) The build type
        # 6) The build unity setting
        # 7) The build custom name.
        # 8) The hash of all the header files under the source dir.
        # 9) The hash of all the code files under the source dir.
        # When restoring, if the matching cache is not found, search for the
        # cache from the "base" build, which should have just completed, and
        # the NIH built as a fallback, but that should never happen.
        with:
          path: ${{ env.CACHE_DIR }}
          key: ${{ runner.os }}-${{ needs.linux-cache.outputs.cmakeconfig }}-${{ matrix.image }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.unity }}-${{ matrix.name }}-${{ needs.linux-cache.outputs.headers }}-${{ needs.linux-cache.outputs.source }}
          restore-keys: |
            ${{ runner.os }}-${{ needs.linux-cache.outputs.cmakeconfig }}-${{ matrix.image }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.UNITY }}-base-${{ needs.linux-cache.outputs.headers }}-${{ needs.linux-cache.outputs.source }}
            ${{ runner.os }}-${{ needs.linux-cache.outputs.cmakeconfig }}-${{ matrix.image }}-nih
      - name: Build and test
        uses: ./.github/actions/build-action
        with:
          image: ${{ matrix.image }}
          PARALLEL_TESTS: ${{ matrix.PARALLEL_TESTS }}
          TARGET: ${{ matrix.TARGET }}
          SKIP_TESTS: ${{ matrix.SKIP_TESTS }}
          ASAN_OPTIONS: ${{ matrix.ASAN_OPTIONS }}
          UBSAN_OPTIONS: ${{ matrix.UBSAN_OPTIONS }}
          TSAN_OPTIONS: ${{ matrix.TSAN_OPTIONS }}
          NINJA_BUILD: ${{ matrix.NINJA_BUILD }}
          CMAKE_EXE: ${{ matrix.CMAKE_EXE }}
      - name: Debug output artifacts
        if: always()
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: debug-output ${{ matrix.name }} ${{ matrix.CC }} ${{ matrix.BUILD_TYPE }} unity=${{ matrix.unity }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            build/**/CMakeOutput.log
            build/**/CMakeError.log
      - name: rippled executable artifact
        if: matrix.TARGET != 'validator-keys'
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: rippled ${{ matrix.name }} ${{ matrix.CC }} ${{ matrix.BUILD_TYPE }} unity=${{ matrix.unity }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            build/**/rippled
            !build/**/_INSTALLED_/**
      - name: validator-keys executable artifact
        if: matrix.TARGET == 'validator-keys'
        uses: actions/upload-artifact@v2
        continue-on-error: true
        with:
          name: validator-keys
          retention-days: 7
          if-no-files-found: ignore
          path: |
            build/**/validator-keys
            !build/**/_INSTALLED_/**
            !build/**/CMake*
            !build/**/cmake*
  linux-runners:
    name: Linux manual tests
    needs: linux-base
    runs-on: ubuntu-18.04
    timeout-minutes: 720
    # if: commit_message !~ /travis_run_/ OR commit_message =~ /travis_run_linux/
    strategy:
      fail-fast: false
      matrix:
        # Current travis: gcc-8 clang-8 gcc-9 clang-9
        # docker image has clang 7,8,9 & gcc 6,7,8,9
        name: [ "Manual tests" ]
        MANUAL_TESTS: [ "true" ]
        CC: [ "gcc-8" ]
        BUILD_TYPE: [ Debug, Release ]
        unity: [ "ON" ]
        image: [ "rippled-ci-builder:2944b78d22db" ]
    # https://docs.github.com/en/free-pro-team@latest/actions/reference/workflow-syntax-for-github-actions#jobsjob_idcontinue-on-error
    # Temporary, because I just want to see a job succeed
    continue-on-error: true
    container:
      image: rippleci/${{ matrix.image }}
    env:
      CC: ${{ matrix.CC }}
      BUILD_TYPE: ${{ matrix.BUILD_TYPE }}
      CMAKE_ADD: "-Dunity=${{ matrix.unity }} ${{ matrix.CMAKE_ADD }}"
      NUM_PROCESSORS: ${{ matrix.NUM_PROCESSORS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Download rippled artifact
        uses: actions/download-artifact@v2
        with:
          name: rippled ${{ matrix.name }} ${{ matrix.CC }} ${{ matrix.BUILD_TYPE }} unity=${{ matrix.unity }}
      - name: Check
        run: find -iname rippled -ls
      # - name: Run manual tests
