name: Build and test rippled
on: [push, pull_request]

env:
  CMAKE_EXTRA_ARGS: "-Dwerr=ON -Dwextra=ON"
  NINJA_BUILD: true
  CACHE_DIR: ${{ github.workspace }}/_cache
  NIH_CACHE_ROOT: ${{ github.workspace }}/_cache/nih_c
  PARALLEL_TESTS: true
  USE_CCACHE: true
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_NOHASHDIR: true
  CCACHE_DIR: ${{ github.workspace }}/_cache/ccache

jobs:
  linux1:
    name: Linux 1
    runs-on: ubuntu-18.04
    timeout-minutes: 720
    # if: commit_message !~ /travis_run_/ OR commit_message =~ /travis_run_linux/
    strategy:
      fail-fast: false
      matrix:
        # Current travis: gcc-8 clang-8 gcc-9 clang-9
        # docker image has clang 7,8,9 & gcc 6,7,8,9
        CC: [ "gcc-9", "clang-8" , "clang-9" , "gcc-8" ]
        BUILD_TYPE: [ Debug, Release ]
        unity: [ "unity=OFF", "unity=ON" ]
        canfail: [ false ]
        #exclude:
        #    - CC: "clang-8"
        #    - CC: "clang-9"
        #    - CC: "gcc-8"
        #    - BUILD_TYPE: "Debug"
        include:
            # This include overrides the combo built in the matrix
            - CC: "gcc-9"
              BUILD_TYPE: "Release"
              unity: "unity=ON"
              # NUM_PROCESSORS: 1
              CMAKE_ADD: "-DCMAKE_UNITY_BUILD_BATCH_SIZE=7"
    # https://docs.github.com/en/free-pro-team@latest/actions/reference/workflow-syntax-for-github-actions#jobsjob_idcontinue-on-error
    continue-on-error: ${{ matrix.canfail }}
    container:
      image: "rippleci/rippled-ci-builder:2020-01-08"
    env:
      CC: ${{ matrix.CC }}
      BUILD_TYPE: ${{ matrix.BUILD_TYPE }}
      CMAKE_ADD: "-D${{ matrix.unity }} ${{ matrix.CMAKE_ADD }}"
      NUM_PROCESSORS: ${{ matrix.NUM_PROCESSORS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: cache
        continue-on-error: true
        uses: actions/cache@v2
        with:
          path: ${{ env.CACHE_DIR }}
          key:  ${{ runner.os }}-build-${{ hashfiles('**/CMakeFiles.txt', '**/Builds/CMake/*', '**/Builds/CMake/deps/*') }}-${{ matrix.CC }}-${{ matrix.BUILD_TYPE }}-${{ matrix.UNITY }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashfiles('**/CMakeFiles.txt', '**/Builds/CMake/*', '**/Builds/CMake/deps/*') }}
      - name: Dump-environment
        run: |
          env
          set | grep =
      - name: ccache stats before
        run: ccache -s
      - name: Build and test
        shell: bash
        run: |
          export CXX=${CC/gcc/g++}
          export CXX=${CXX/clang/clang++}
          export NUM_PROCESSORS=${NUM_PROCESSORS:-$( nproc )}
          echo NUM_PROCESSORS is ${NUM_PROCESSORS}
          if [ "${CMAKE_ADD}" != "" ] ; then export CMAKE_EXTRA_ARGS="${CMAKE_EXTRA_ARGS} ${CMAKE_ADD}"; fi
          bin/ci/ubuntu/build-and-test.sh
      - name: ccache stats after
        run: ccache -s
      - name: Debug output
        if: always()
        shell: bash
        run: if [ -e build ] ; then find build \( -name CMakeOutput.log -o -name CMakeError.log \) -ls -exec cat {} \; ; fi
  linux2:
    name: Linux 2
    runs-on: ubuntu-18.04
    timeout-minutes: 720
    # if: commit_message !~ /travis_run_/ OR commit_message =~ /travis_run_linux/
    strategy:
      fail-fast: false
      matrix:
        # Current travis: gcc-8 clang-8 gcc-9 clang-9
        # docker image has clang 10 & gcc 7,8
        CC: [ "gcc-8", "clang-10" ]
        BUILD_TYPE: [ Debug, Release ]
        unity: [ "unity=OFF", "unity=ON" ]
        canfail: [ false ]
        #exclude:
        #  - CC: "clang-10"
    # https://docs.github.com/en/free-pro-team@latest/actions/reference/workflow-syntax-for-github-actions#jobsjob_idcontinue-on-error
    continue-on-error: ${{ matrix.canfail }}
    container:
      image: "rippleci/rippled-ci-builder:2944b78d22db"
    env:
      CC: ${{ matrix.CC }}
      BUILD_TYPE: ${{ matrix.BUILD_TYPE }}
      CMAKE_ADD: "-D${{ matrix.unity }} -DBoost_NO_BOOST_CMAKE=ON ${{ matrix.CMAKE_ADD }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: cache
        continue-on-error: true
        uses: actions/cache@v2
        with:
          path: ${{ env.CACHE_DIR }}
